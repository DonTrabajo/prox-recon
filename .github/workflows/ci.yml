name: CI

on:
  push:
  pull_request:

jobs:
  demo-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run demo
        run: |
          python -m tools.demo

      - name: OPSEC scan
        run: |
          python scripts/opsec_scan.py --root . --exclude scripts/opsec_testdata
